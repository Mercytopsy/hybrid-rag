services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: novatech
      POSTGRES_PASSWORD: novatech
      POSTGRES_DB: novatech
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novatech"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://novatech:novatech@db:5432/novatech
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
